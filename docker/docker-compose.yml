services:
  harness-lab-postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    environment:
      POSTGRES_DB: harness_lab
      POSTGRES_USER: harness_lab
      POSTGRES_PASSWORD: harness_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - agent-os-network

  harness-lab-redis:
    image: docker.1ms.run/library/redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - agent-os-network

  harness-lab-minio:
    image: docker.1ms.run/minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${HARNESS_AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${HARNESS_AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-os-network

  agent-os-backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../.env
    ports:
      - "4600:4600"
    environment:
      - HOST=0.0.0.0
      - PORT=4600
      - DEBUG=False
      - PYTHONPATH=/app
      - HARNESS_DB_URL=${HARNESS_DB_URL:-postgresql://harness_lab:harness_lab@harness-lab-postgres:5432/harness_lab}
      - HARNESS_REDIS_URL=${HARNESS_REDIS_URL:-redis://harness-lab-redis:6379/0}
      - HARNESS_REDIS_NAMESPACE=${HARNESS_REDIS_NAMESPACE:-harness_lab}
      - HARNESS_ARTIFACT_BACKEND=${HARNESS_ARTIFACT_BACKEND:-local}
      - HARNESS_ARTIFACT_ROOT=${HARNESS_ARTIFACT_ROOT:-/app/backend/data/harness_lab/artifacts}
      - HARNESS_ARTIFACT_BUCKET=${HARNESS_ARTIFACT_BUCKET:-harness-lab-artifacts}
      - HARNESS_ARTIFACT_PREFIX=${HARNESS_ARTIFACT_PREFIX:-harness-lab}
      - HARNESS_AWS_ENDPOINT_URL=${HARNESS_AWS_ENDPOINT_URL:-http://harness-lab-minio:9000}
      - HARNESS_AWS_REGION=${HARNESS_AWS_REGION:-us-east-1}
      - HARNESS_AWS_ACCESS_KEY_ID=${HARNESS_AWS_ACCESS_KEY_ID:-minioadmin}
      - HARNESS_AWS_SECRET_ACCESS_KEY=${HARNESS_AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - ../backend/data:/app/backend/data:rw
    restart: unless-stopped
    depends_on:
      harness-lab-postgres:
        condition: service_started
      harness-lab-redis:
        condition: service_started
      harness-lab-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "health-check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agent-os-network

  agent-os-frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      agent-os-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-os-network

networks:
  agent-os-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
