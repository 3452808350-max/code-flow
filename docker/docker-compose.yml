services:
  agent-os-backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../.env
    ports:
      - "4600:4600"
    environment:
      - HOST=0.0.0.0
      - PORT=4600
      - DEBUG=False
      - PYTHONPATH=/app
    volumes:
      - ../backend/data:/app/backend/data:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "health-check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agent-os-network

  agent-os-frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      agent-os-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-os-network

networks:
  agent-os-network:
    driver: bridge
